<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion – SplitTrip</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #1e293b 0%, #2563eb 100%); min-height: 100vh; display: flex; align-items: center; }
    .card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .brand { font-size: 2rem; font-weight: 800; color: #1e293b; letter-spacing: -1px; }
    .brand span { color: #2563eb; }
    .form-control { border-radius: 8px; padding: .65rem 1rem; }
    .btn-primary { background: #2563eb; border: none; border-radius: 8px; padding: .7rem; font-weight: 600; }
    .btn-primary:hover { background: #1d4ed8; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card p-4">
        <div class="text-center mb-4">
          <div class="brand">✈️ Split<span>Trip</span></div>
          <p class="text-muted mt-1">Gérez vos dépenses de voyage en groupe</p>
        </div>
        {% if form.errors %}
          <div class="alert alert-danger">Identifiants incorrects.</div>
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Nom d'utilisateur</label>
            <input type="text" name="username" class="form-control" autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Mot de passe</label>
            <input type="password" name="password" class="form-control">
          </div>
          <input type="hidden" name="next" value="{{ next }}">
          <button type="submit" class="btn btn-primary w-100 mt-1">
            <i class="fa fa-sign-in-alt me-2"></i>Se connecter
          </button>
        </form>
        <hr>
        <p class="text-center text-muted mb-0">
          Pas de compte ? <a href="{% url 'register' %}">Créer un compte</a>
        </p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
