{% extends 'base.html' %}
{% block title %}Supprimer la dépense{% endblock %}
{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card text-center p-4">
        <div style="font-size:3rem;">🗑️</div>
        <h4 class="fw-bold mt-3">Supprimer cette dépense ?</h4>
        <p class="text-muted"><strong>{{ expense.title }}</strong> — {{ expense.amount }} {{ trip.currency }}</p>
        <div class="d-flex gap-2 justify-content-center mt-3">
          <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Supprimer</button>
          </form>
          <a href="{% url 'trip_detail' trip.pk %}" class="btn btn-outline-secondary">Annuler</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
